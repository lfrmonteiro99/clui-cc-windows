name: CI — Linux

on:
  push:
    branches: [main]
    paths:
      - 'src/main/**'
      - 'src/renderer/**'
      - 'src/shared/**'
      - 'src/preload/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - 'electron.vite.config.ts'
      - 'vitest.config.ts'
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Type-check and build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev xvfb

      - name: Install Playwright system deps (covers all Chromium/Electron libs)
        run: npx playwright install-deps

      - name: Disable AppArmor unprivileged userns restriction
        # Ubuntu 24.04+ enables kernel.apparmor_restrict_unprivileged_userns=1
        # by default, which prevents Electron from creating its sandbox namespace.
        # This is the recommended CI workaround (preserves other sandbox protections).
        # See: https://github.com/electron/electron/issues/41066
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install dependencies
        run: npm ci

      - name: Run Electron E2E smoke tests
        env:
          DISPLAY: ':99'
          ELECTRON_DISABLE_SANDBOX: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-linux
          path: output/playwright
